      - heading "Diversification is key." [level=2] [ref=e118]
      - paragraph [ref=e119]: Rigorous due diligence and evaluation processes are applied to each investment opportunity. Understanding and managing the downside risk is essential — capital preservation comes before capital growth.
      - generic [ref=e120]:
        - generic [ref=e121]:
          - heading "Absolute returns" [level=3] [ref=e123]
          - paragraph [ref=e124]: Aim for positive returns across cycles — not benchmark-hugging.
        - generic [ref=e125]:
          - heading "Hedged exposures" [level=3] [ref=e127]
          - paragraph [ref=e128]: Long/short positioning to temper drawdowns and isolate conviction.
        - generic [ref=e129]:
          - heading "Diversification" [level=3] [ref=e131]
          - paragraph [ref=e132]: Across asset classes, geographies, managers and time horizons.
        - generic [ref=e133]:
          - heading "Downside discipline" [level=3] [ref=e135]
          - paragraph [ref=e136]: Position sizing and risk budgeting governed by loss tolerance, not upside dreams.
