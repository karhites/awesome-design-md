      - generic [ref=e126]: Investment Philosophy
      - heading "Diversification is key." [level=2] [ref=e127]
      - paragraph [ref=e128]: Rigorous due diligence and evaluation processes are used for each investment opportunity. Understanding and managing the downside risk is essential — capital preservation comes before capital growth.
      - generic [ref=e129]:
        - generic [ref=e130]:
          - heading "Diversification" [level=3] [ref=e132]
          - paragraph [ref=e133]: Across asset classes, geographies, managers and time horizons.
        - generic [ref=e134]:
          - heading "Absolute returns" [level=3] [ref=e136]
          - paragraph [ref=e137]: Positive returns targeted across cycles — not benchmark-hugging.
        - generic [ref=e138]:
          - heading "Hedged exposures" [level=3] [ref=e140]
          - paragraph [ref=e141]: Long and short positioning to temper drawdowns and isolate conviction.
        - generic [ref=e142]:
          - heading "Downside discipline" [level=3] [ref=e144]
          - paragraph [ref=e145]: Position sizing governed by loss tolerance, not upside dreams.
