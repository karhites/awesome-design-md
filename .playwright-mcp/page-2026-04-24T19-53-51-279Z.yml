      - generic [ref=e119]: Investment Philosophy
      - heading "Diversification is key." [level=2] [ref=e120]
      - paragraph [ref=e121]: Rigorous due diligence and evaluation processes are used for each investment opportunity. Understanding and managing the downside risk is essential — capital preservation comes before capital growth.
      - generic [ref=e122]:
        - generic [ref=e123]:
          - heading "Diversification" [level=3] [ref=e125]
          - paragraph [ref=e126]: Across asset classes, geographies, managers and time horizons.
        - generic [ref=e127]:
          - heading "Absolute returns" [level=3] [ref=e129]
          - paragraph [ref=e130]: Positive returns targeted across cycles — not benchmark-hugging.
        - generic [ref=e131]:
          - heading "Hedged exposures" [level=3] [ref=e133]
          - paragraph [ref=e134]: Long and short positioning to temper drawdowns and isolate conviction.
        - generic [ref=e135]:
          - heading "Downside discipline" [level=3] [ref=e137]
          - paragraph [ref=e138]: Position sizing governed by loss tolerance, not upside dreams.
